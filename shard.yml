name: context
version: 0.1.0

description: Cooperative cancellation, deadlines, and request-scoped values for Crystal.

authors:
  - Mauricio Gomes <mauricio@edge14.com>

repository: https://github.com/mgomes/context

crystal: ">= 1.19.1"

development_dependencies:
  ameba:
    github: crystal-ameba/ameba
    version: ~> 1.6

targets:
  timeout_loop:
    main: examples/timeout_loop.cr
  channel_receive:
    main: examples/channel_receive.cr
  cooperative_worker:
    main: examples/cooperative_worker.cr
  sandbox_interpreter:
    main: examples/sandbox_interpreter.cr

license: MIT
