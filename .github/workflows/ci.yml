name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  spec:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.crystal == 'latest' }}
    strategy:
      fail-fast: false
      matrix:
        crystal: ["1.19.1", latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal }}

      - name: Check formatting
        run: crystal tool format --check

      - name: Run specs
        run: crystal spec --error-on-warnings

      - name: Run full suite under preview multithreading
        run: crystal spec --error-on-warnings -Dpreview_mt -Dexecution_context

      - name: Build example targets
        run: shards build --error-on-warnings
